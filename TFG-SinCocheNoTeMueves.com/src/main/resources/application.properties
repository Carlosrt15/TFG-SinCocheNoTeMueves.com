# =====================================================================
#  Configuracion de la aplicacion - SinCocheNoTeMueves
# =====================================================================

# === Base de datos H2 (embebida, no requiere instalacion) ===
# Los datos se persisten en ./data/sincoche.mv.db (dentro del backend).
# La BD se crea automaticamente la primera vez que arranca la app.
spring.datasource.url=jdbc:h2:file:./data/sincoche;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER,VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# === Consola web de H2 ===
# Muy util para defensa: permite ver/editar la BD desde el navegador.
# Acceso: http://localhost:8090/h2-console
#   - JDBC URL:  jdbc:h2:file:./data/sincoche
#   - User:      sa
#   - Password:  (vacio)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# === JPA / Hibernate ===
# `update` mantiene los datos entre arranques y va creando tablas nuevas.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# === Servidor ===
# Puerto 8090 (el 8080 lo ocupa otra web del sistema).
server.port=8090

# === JWT ===
# IMPORTANTE: en produccion usar variable de entorno (export APP_JWT_SECRET=...)
# La clave debe tener al menos 32 caracteres (256 bits) para HS256.
app.jwt.secret=${APP_JWT_SECRET:tfg_sincochenotemueves_clave_super_segura_2026_cambiar_en_prod}


